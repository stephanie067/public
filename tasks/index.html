<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"/>
    <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
    />
    <title>Logger</title>
</head>
<body>
    <input 
    id="usuario" 
    type="text" 
    placeholder="usuários" 
    />
    <input 
    id="password" 
    type="password" 
    placeholder="senha" 
    />
    <button>entrar</button>

    <script>
        const nome_usuario = document.querySelector('#usuario');
        const senha_usuario = document.querySelector('#password');
        const botao = document.querySelector('button');

        botao.addEventListener('click', ()=> {

            const usuario = 'Stezinha';
            const senha = 'gamer123';

            const nome_usuario_value = nome_usuario.value;
            const senha_usuario_value = senha_usuario.value;

            if (nome_usuario_value !== usuario || senha_usuario_value !== senha) {
                alert('Usuário ou senha incorreta');
                return;
            };

            alert('Dados válidos. Acessando sistema...');

            window.location.href = './system.html';

        });

    </script>

</body>
</html>
