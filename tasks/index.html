<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"/>
    <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0"
    />
    <title>Logger</title>
</head>
<body>
    <p>Digite um número e veja o dobro dele.</p>
    <input type="number" placeholder="Digite um numero" />
    <button>dobrar</button>
    <h1></h1>

    <script>

        const numero = document.querySelector('input');
        const botao = document.querySelector('button'); 
        const titulo = document.querySelector('h1');

        botao.addEventListener('click', () => {
            const valor = numero.value;

            const resultado = valor * 2;

            titulo.textContent = resultado;
        });

    </script>

</body>
</html>
